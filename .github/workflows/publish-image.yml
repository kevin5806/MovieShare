name: Publish container image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      version:
        description: "Stable semver to publish, for example 1.2.3 or v1.2.3"
        required: true
        type: string
      platforms:
        description: "Comma-separated Docker platforms to publish for manual runs"
        required: true
        type: string
        default: "linux/amd64"
      publish_latest:
        description: "Also publish the latest tag"
        required: true
        type: boolean
        default: false

permissions:
  actions: write
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  verify-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: movieshare
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d movieshare"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/movieshare?schema=public
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres?schema=public
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Prisma migrations
        run: npm run db:check-migrations

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build application
        run: npm run build

  publish:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: movieshare
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d movieshare"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/movieshare?schema=public
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres?schema=public

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: prep
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PLATFORMS: ${{ inputs.platforms }}
          INPUT_PUBLISH_LATEST: ${{ inputs.publish_latest }}
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            RELEASE_KIND="manual"
            RAW_VERSION="${INPUT_VERSION}"
            PLATFORMS="${INPUT_PLATFORMS}"
            PUBLISH_LATEST="${INPUT_PUBLISH_LATEST}"
          elif [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            RELEASE_KIND="tag"
            RAW_VERSION="${GITHUB_REF_NAME}"
            PLATFORMS="linux/amd64,linux/arm64"
            PUBLISH_LATEST="true"
          else
            RELEASE_KIND="main"
            RAW_VERSION="$(node -p "require('./package.json').version")"
            SHORT_SHA="$(printf '%s' "${GITHUB_SHA}" | cut -c1-12)"
            PLATFORMS="linux/amd64"
            PUBLISH_LATEST="false"
          fi

          VERSION="${RAW_VERSION#v}"
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          GHCR_IMAGE="ghcr.io/${OWNER_LC}/movieshare"
          DOCKERHUB_ENABLED="false"

          if [ "${RELEASE_KIND}" = "main" ]; then
            VERSION_LABEL="${VERSION}+sha.${SHORT_SHA}"
            TAGS="${GHCR_IMAGE}:main
            ${GHCR_IMAGE}:sha-${SHORT_SHA}"
          else
            if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Only stable semver tags are published by this workflow."
              echo "Examples: v1.2.3 or 1.2.3"
              exit 1
            fi

            VERSION_LABEL="${VERSION}"
            MAJOR="${VERSION%%.*}"
            MINOR="${VERSION%.*}"

            TAGS="${GHCR_IMAGE}:${VERSION}
            ${GHCR_IMAGE}:${MINOR}
            ${GHCR_IMAGE}:${MAJOR}"

            if [ "${PUBLISH_LATEST}" = "true" ]; then
              TAGS="${TAGS}
              ${GHCR_IMAGE}:latest"
            fi
          fi

          if [ -n "${DOCKERHUB_NAMESPACE}" ] && [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            DOCKERHUB_IMAGE="docker.io/${DOCKERHUB_NAMESPACE}/movieshare"

            if [ "${RELEASE_KIND}" = "main" ]; then
              TAGS="${TAGS}
              ${DOCKERHUB_IMAGE}:main
              ${DOCKERHUB_IMAGE}:sha-${SHORT_SHA}"
            else
              TAGS="${TAGS}
              ${DOCKERHUB_IMAGE}:${VERSION}
              ${DOCKERHUB_IMAGE}:${MINOR}
              ${DOCKERHUB_IMAGE}:${MAJOR}"

              if [ "${PUBLISH_LATEST}" = "true" ]; then
                TAGS="${TAGS}
                ${DOCKERHUB_IMAGE}:latest"
              fi
            fi

            DOCKERHUB_ENABLED="true"
          fi

          {
            echo "release_kind=${RELEASE_KIND}"
            echo "version=${VERSION}"
            echo "version_label=${VERSION_LABEL}"
            echo "ghcr_image=${GHCR_IMAGE}"
            echo "dockerhub_enabled=${DOCKERHUB_ENABLED}"
            echo "platforms=${PLATFORMS}"
            echo "cache_scope=publish-image"
            echo "tags<<EOF"
            echo "${TAGS}" | sed 's/^[[:space:]]*//'
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.prep.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Prisma migrations
        run: npm run db:check-migrations

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ steps.prep.outputs.platforms }}
          tags: ${{ steps.prep.outputs.tags }}
          labels: |
            org.opencontainers.image.title=movieshare
            org.opencontainers.image.description=Self-hosted collaborative movie planning workspace
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.prep.outputs.version_label }}
          cache-from: type=gha,scope=${{ steps.prep.outputs.cache_scope }}
          cache-to: type=gha,mode=min,scope=${{ steps.prep.outputs.cache_scope }},ignore-error=true

      - name: Prune stale publish caches
        if: success()
        uses: actions/github-script@v7
        env:
          CACHE_KEY_PREFIX: ${{ steps.prep.outputs.cache_scope }}
          CACHE_KEEP_COUNT: "6"
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const key = process.env.CACHE_KEY_PREFIX;
            const keepCount = Number.parseInt(process.env.CACHE_KEEP_COUNT ?? "6", 10);
            const caches = [];

            for (let page = 1; ; page += 1) {
              const response = await github.request("GET /repos/{owner}/{repo}/actions/caches", {
                owner,
                repo,
                key,
                sort: "last_accessed_at",
                direction: "desc",
                per_page: 100,
                page,
              });

              caches.push(...response.data.actions_caches);

              if (response.data.actions_caches.length < 100) {
                break;
              }
            }

            core.info(`Found ${caches.length} caches matching '${key}'. Keeping the ${Math.min(caches.length, keepCount)} most recent entries.`);

            for (const cache of caches.slice(keepCount)) {
              await github.request("DELETE /repos/{owner}/{repo}/actions/caches/{cache_id}", {
                owner,
                repo,
                cache_id: cache.id,
              });

              core.info(`Deleted cache ${cache.id} (${cache.key}) last used ${cache.last_accessed_at}.`);
            }
