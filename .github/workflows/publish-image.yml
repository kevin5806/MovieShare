name: Publish container image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Stable semver to publish, for example 1.2.3 or v1.2.3"
        required: true
        type: string
      publish_latest:
        description: "Also publish the latest tag"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: prep
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PUBLISH_LATEST: ${{ inputs.publish_latest }}
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            RAW_VERSION="${INPUT_VERSION}"
            PUBLISH_LATEST="${INPUT_PUBLISH_LATEST}"
          else
            RAW_VERSION="${GITHUB_REF_NAME}"
            PUBLISH_LATEST="true"
          fi

          VERSION="${RAW_VERSION#v}"

          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Only stable semver tags are published by this workflow."
            echo "Examples: v1.2.3 or 1.2.3"
            exit 1
          fi

          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          GHCR_IMAGE="ghcr.io/${OWNER_LC}/movieshare"
          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION%.*}"

          TAGS="${GHCR_IMAGE}:${VERSION}
          ${GHCR_IMAGE}:${MINOR}
          ${GHCR_IMAGE}:${MAJOR}"

          if [ "${PUBLISH_LATEST}" = "true" ]; then
            TAGS="${TAGS}
            ${GHCR_IMAGE}:latest"
          fi

          DOCKERHUB_ENABLED="false"

          if [ -n "${DOCKERHUB_NAMESPACE}" ] && [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            DOCKERHUB_IMAGE="docker.io/${DOCKERHUB_NAMESPACE}/movieshare"
            TAGS="${TAGS}
            ${DOCKERHUB_IMAGE}:${VERSION}
            ${DOCKERHUB_IMAGE}:${MINOR}
            ${DOCKERHUB_IMAGE}:${MAJOR}"

            if [ "${PUBLISH_LATEST}" = "true" ]; then
              TAGS="${TAGS}
              ${DOCKERHUB_IMAGE}:latest"
            fi

            DOCKERHUB_ENABLED="true"
          fi

          {
            echo "version=${VERSION}"
            echo "ghcr_image=${GHCR_IMAGE}"
            echo "dockerhub_enabled=${DOCKERHUB_ENABLED}"
            echo "tags<<EOF"
            echo "${TAGS}" | sed 's/^[[:space:]]*//'
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.prep.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.prep.outputs.tags }}
          labels: |
            org.opencontainers.image.title=movieshare
            org.opencontainers.image.description=Self-hosted collaborative movie planning workspace
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.prep.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
