services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: movielist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d movielist"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/movielist?schema=public
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: change-this-to-a-random-32-char-secret
      TMDB_API_TOKEN: ${TMDB_API_TOKEN:-}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@movielist.local}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-movielist admin}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-movielist <noreply@movielist.local>}
    ports:
      - "3000:3000"
    command: >
      sh -c "npm run db:push &&
             npm run db:seed &&
             npm run start"

volumes:
  postgres-data:
