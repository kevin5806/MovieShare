name: movieshare

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-movieshare}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your production env file}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-movieshare}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in your production env file}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: quay.io/minio/mc:latest
    restart: "no"
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-movieshare}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in your production env file}
      MINIO_BUCKET: ${STORAGE_BUCKET:-movieshare-media}
    entrypoint:
      - /bin/sh
      - -c
    command:
      - 'until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 2; done; mc mb -p local/"$$MINIO_BUCKET" || true; mc anonymous set download local/"$$MINIO_BUCKET"'

  media-cdn:
    image: nginx:1.28-alpine
    restart: unless-stopped
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${MEDIA_CDN_PORT:-3080}:8080"
    volumes:
      - ./infra/nginx/media-cdn.conf:/etc/nginx/nginx.conf:ro
      - media-cdn-cache:/var/cache/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ${MOVIESHARE_IMAGE:?Set MOVIESHARE_IMAGE to a registry tag like ghcr.io/owner/movieshare:1.2.3}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      media-cdn:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      HOSTNAME: 0.0.0.0
      PORT: 3000
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?Set BETTER_AUTH_URL}
      NEXT_PUBLIC_BETTER_AUTH_URL: ${NEXT_PUBLIC_BETTER_AUTH_URL:?Set NEXT_PUBLIC_BETTER_AUTH_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET}
      TMDB_API_TOKEN: ${TMDB_API_TOKEN:-}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@movieshare.local}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-movieshare admin}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-movieshare <noreply@movieshare.local>}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://minio:9000}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:-https://media.example.com/movieshare-media}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-movieshare-media}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-${MINIO_ROOT_USER:-movieshare}}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in your production env file}}
      STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE:-true}
    ports:
      - "${APP_PORT:-3000}:3000"
    command: node scripts/container-start.mjs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  postgres-data:
  minio-data:
  media-cdn-cache:
